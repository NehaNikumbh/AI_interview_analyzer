<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Interview Analyzer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.login-container{

    width:420px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:20px;

    padding:40px;
}

.logo{
    text-align:center;
    margin-bottom:10px;
    font-size:50px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;

    margin-bottom:18px;

    border:none;

    border-radius:10px;

    background:rgba(255,255,255,0.1);

    color:white;

    font-size:15px;
}

input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#3b82f6;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    background:#2563eb;
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    color:#60a5fa;
    text-decoration:none;
}

.message{
    text-align:center;
    color:#fca5a5;
    margin-bottom:15px;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="logo">🎤</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Login to continue your AI interview practice
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">

        <input
        type="text"
        name="username"
        placeholder="Enter Username"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register-link">

        Don't have an account?

        <a href="/register">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
