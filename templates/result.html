<!DOCTYPE html>
<html>
<head>
    <title>Interview Result</title>

    <style>
        body{
            margin:0;
            font-family:Segoe UI,sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            text-align:center;
        }

        .container{
            width:80%;
            margin:auto;
            padding-top:80px;
        }

        .result-card{
            background:rgba(255,255,255,0.08);
            padding:40px;
            border-radius:20px;
            width:60%;
            margin:auto;
        }

        h1{
            color:#60a5fa;
        }

        .score{
            font-size:60px;
            font-weight:bold;
            color:#22c55e;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        .btn:hover{
            background:#2563eb;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="result-card">

        <h1>🎉 Interview Completed</h1>

        <div class="score">
            {{ score }}/100
        </div>

        <h3>AI Feedback</h3>

        <p>{{ feedback }}</p>

        <a href="/dashboard" class="btn">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
